name: PR Checks

on:
  pull_request:

jobs:
  checks:
    name: Test, Build and Smoke Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run tsc

      - name: Test
        run: bun test

      - name: Build examples
        run: bun run build

      - name: Smoke test example binaries
        shell: bash
        run: |
          set -euo pipefail

          wait_for_health() {
            local port="$1"
            for _ in {1..60}; do
              if curl --fail --silent "http://127.0.0.1:${port}/api/health" >/dev/null; then
                return 0
              fi
              sleep 0.5
            done
            echo "Server on port ${port} did not become healthy" >&2
            return 1
          }

          KITCHEN_SINK_HOST=127.0.0.1 \
          KITCHEN_SINK_PORT=3302 \
          KITCHEN_SINK_DATA_DIR="$(mktemp -d)" \
          KITCHEN_SINK_DISABLE_PASSKEY=true \
            ./examples/kitchen-sink/dist/kitchen-sink serve &
          kitchen_pid="$!"

          NOTES_TODO_HOST=127.0.0.1 \
          NOTES_TODO_PORT=3301 \
          NOTES_TODO_DATA_DIR="$(mktemp -d)" \
          NOTES_TODO_DISABLE_PASSKEY=true \
            ./examples/notes-todo/dist/notes-todo serve &
          notes_pid="$!"

          cleanup() {
            kill "$kitchen_pid" "$notes_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          wait_for_health 3302
          wait_for_health 3301
          curl --fail --silent http://127.0.0.1:3302/api/public/ping >/dev/null
          curl --fail --silent http://127.0.0.1:3301/api/public/ping >/dev/null
