name: Release NPM Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.2.3
        required: true

jobs:
  publish:
    name: Publish @pablozaiden/webapp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Set package version
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          jq --arg version "$VERSION" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Verify package version
        run: |
          EXPECTED="${{ steps.release.outputs.version }}"
          ACTUAL="$(jq -r '.version' package.json)"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Version mismatch. Expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish --tag unstable --provenance --access public
          else
            npm publish --provenance --access public
          fi
